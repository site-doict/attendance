<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Attendance</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Office Attendance">
<link rel="apple-touch-icon" href="./icon-192.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
*{ box-sizing: border-box; margin:0; padding:0; }

body{
    font-family: 'Outfit', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
}

/* --- Animated Background --- */
.animated-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: #0f172a;
    overflow: hidden;
}

.blob {
    position: absolute;
    width: 600px;
    height: 600px;
    filter: blur(80px);
    border-radius: 50%;
    z-index: -1;
    opacity: 0.3;
    animation: move-blobs 25s infinite alternate ease-in-out;
}

.blob-1 { 
    top: 10%; 
    left: 10%; 
    background: #3b82f6; 
}

.blob-2 { 
    bottom: 10%; 
    right: 15%; 
    background: #8b5cf6; 
    animation-delay: -5s;
}

.blob-3 { 
    top: 40%; 
    left: 40%; 
    background: #0ea5e9; 
    animation-delay: -10s;
    width: 400px; 
    height: 400px; 
}

@keyframes move-blobs {
    0% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(150px, 100px) scale(1.2); }
    100% { transform: translate(-100px, 200px) scale(0.8); }
}

.login-box{
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 35px 30px;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
}

.login-box h2{
    text-align: center;
    margin-bottom: 8px;
    color: #fff;
    font-size: 26px;
    font-weight: 600;
}

.login-box p{
    text-align: center;
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    margin-bottom: 25px;
}

input{
    width: 100%;
    padding: 14px 15px;
    margin: 10px 0;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 15px;
    color: white;
    outline: none;
    transition: all 0.3s ease;
}

input::placeholder { color: rgba(255, 255, 255, 0.3); }

input:focus{
    border-color: #3b82f6;
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}

button{
    width: 100%;
    padding: 14px;
    background: #3b82f6;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-size: 16px;
    margin-top: 15px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

button:hover{ 
    background: #2563eb; 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
}

#error{
    color: #f87171;
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    min-height: 20px;
}

#loading{
    display: none;
    text-align: center;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="animated-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="login-box">
    <h2>🏢 Office Attendance</h2>
    <p>Upazila ICT Office, Madarganj</p>

    <input type="text" id="userid" placeholder="Enter Employee ID" autocomplete="off">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div id="loading">⏳ Verifying...</div>
    <div id="error"></div>
</div>

<script>

const USER_SHEET =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQU4-KlIY732XZyhLAZB4-5pUrAcwiqO1bkhrVladSas6MT7ZK967vkNDPd_QzAu7rM72JnT5F5jDzL/pub?gid=32388154&single=true&output=csv";

// Register Service Worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW error:", err));
}

// If already logged in, redirect
const existingId = localStorage.getItem("userid");
const existingRole = localStorage.getItem("role");
if(existingId){
    if(existingRole === "admin" || existingRole === "superadmin"){
        location.href = "./admin.html";
    } else {
        location.href = "./dashboard.html";
    }
}

function login(){

    const id   = document.getElementById("userid").value.trim();
    const pass = document.getElementById("password").value.trim();
    const errEl  = document.getElementById("error");
    const loadEl = document.getElementById("loading");

    errEl.innerText = "";

    if(!id || !pass){
        errEl.innerText = "❌ Enter ID and Password";
        return;
    }

    loadEl.style.display = "block";

    Papa.parse(USER_SHEET, {

        download: true,
        header: true,
        skipEmptyLines: true,

        complete: function(res){

            loadEl.style.display = "none";

            const users = res.data.filter(u => u.ID && u.Password);
            let found = false;

            users.forEach(u => {

                const uID   = (u.ID   || "").trim();
                const uPass = (u.Password || "").trim();
                const uRole = (u.Role || "user").trim().toLowerCase();
                const uName = (u.Name || "").trim();
                const uStatus = (u.Status || "active").trim().toLowerCase();

                if(uID === id && uPass === pass){

                    if (uStatus === "inactive") {
                        errEl.innerText = "❌ Account is deactivated.";
                        found = true; // Prevents "Wrong ID/Password" message
                        return;
                    }

                    found = true;

                    localStorage.setItem("userid", uID);
                    localStorage.setItem("name",   uName);
                    localStorage.setItem("role",   uRole);

                    if(uRole === "admin" || uRole === "superadmin"){
                        location.href = "admin.html";
                    } else {
                        location.href = "dashboard.html";
                    }
                }
            });

            if(!found){
                errEl.innerText = "❌ Wrong ID or Password";
            }
        },

        error: function(err){
            loadEl.style.display = "none";
            console.error(err);
            errEl.innerText = "❌ Cannot connect. Try again.";
        }
    });
}

// Allow Enter key to login
document.addEventListener("keydown", function(e){
    if(e.key === "Enter") login();
});

</script>

</body>
</html>
