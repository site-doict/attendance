<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office Attendance</title>

<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{ box-sizing: border-box; margin:0; padding:0; }

body{
    font-family: 'Outfit', sans-serif;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    padding: 20px;
}

/* --- Animated Background (Mesh Gradient) --- */
.animated-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background: #0f172a;
    background-image: 
        radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.5) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(88, 28, 135, 0.45) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.45) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(76, 29, 149, 0.4) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(15, 23, 42, 0.3) 0px, transparent 50%);
    background-size: 200% 200%;
    animation: mesh 20s ease infinite;
}

@keyframes mesh {
    0% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
}

#particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

.login-box{
    position: relative;
    z-index: 10;
    background: rgba(15, 23, 42, 0.45);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 40px 35px;
    width: 90vw;
    max-width: 360px;
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    transition: all 0.4s ease;
}

.login-box:hover {
    border-color: rgba(59, 130, 246, 0.4);
    box-shadow: 0 0 30px rgba(59, 130, 246, 0.15), 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* Floating Logo Animation */
.logo-float {
    font-size: 48px;
    margin-bottom: 20px;
    display: block;
    text-align: center;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

.login-box h2{
    text-align: center;
    margin-bottom: 8px;
    color: #ffffff;
    font-size: 26px;
    font-weight: 600;
}

.login-box p{
    text-align: center;
    color: rgba(255, 255, 255, 0.85);
    font-size: 14px;
    margin-bottom: 30px;
}

input{
    width: 100%;
    padding: 14px 15px;
    margin: 12px 0;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 15px;
    color: #ffffff;
    outline: none;
    transition: all 0.3s ease;
}

input::placeholder { color: rgba(255, 255, 255, 0.6); }

input:focus{
    border-color: #3b82f6;
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 15px rgba(59, 130, 246, 0.25);
}

button{
    position: relative;
    overflow: hidden;
    width: 100%;
    padding: 15px;
    background: #3b82f6;
    color: #ffffff;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-size: 16px;
    margin-top: 20px;
    font-weight: 700;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
}

button:hover{ 
    background: #2563eb; 
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(59, 130, 246, 0.45);
}

/* Shimmer Effect */
button::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -60%;
    width: 20%;
    height: 200%;
    background: rgba(255, 255, 255, 0.2);
    transform: rotate(30deg);
    transition: 0s;
}

button:hover::after {
    left: 120%;
    transition: 0.6s ease;
}

#error{
    color: #f87171;
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
    min-height: 20px;
}

#loading{
    display: none;
    text-align: center;
    color: rgba(255, 255, 255, 0.5);
    margin-top: 10px;
    font-size: 14px;
}

/* Tablet & Mobile Responsiveness */
@media (max-width: 480px) {
    .login-box {
        padding: 30px 25px;
    }
    .login-box h2 {
        font-size: 22px;
    }
    input, button {
        height: 48px;
    }
    .logo-float {
        font-size: 40px;
    }
}

@media (max-width: 360px) {
    .login-box {
        padding: 25px 20px;
    }
    .login-box h2 {
        font-size: 20px;
    }
    .login-box p {
        font-size: 13px;
    }
}

</style>
</head>

<body>

<div class="animated-bg"></div>
<canvas id="particles"></canvas>

<div class="login-box">
    <div class="logo-float">🏢</div>
    <h2>Office Attendance</h2>
    <p>Upazila ICT Office, Madarganj</p>

    <input type="text" id="userid" placeholder="Enter Employee ID" autocomplete="off">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <div id="loading">⏳ Verifying Account...</div>
    <div id="error"></div>
</div>

<script>

const USER_SHEET =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQU4-KlIY732XZyhLAZB4-5pUrAcwiqO1bkhrVladSas6MT7ZK967vkNDPd_QzAu7rM72JnT5F5jDzL/pub?gid=32388154&single=true&output=csv";

// Register Service Worker
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("SW registered"))
    .catch(err => console.log("SW error:", err));
}

// If already logged in, redirect with basic validation
const existingId = localStorage.getItem("userid");
const existingRole = localStorage.getItem("role");
if(existingId && existingId.length > 0){
    // Basic validation: ensure role is valid
    const validRoles = ["user", "admin", "superadmin"];
    const isValidRole = validRoles.includes(existingRole);
    
    if(isValidRole && (existingRole === "admin" || existingRole === "superadmin")){
        location.href = "./admin.html";
    } else if(isValidRole && existingRole === "user"){
        location.href = "./dashboard.html";
    } else {
        // Invalid role detected - clear and redirect to login
        localStorage.clear();
        console.warn("Invalid role detected, clearing session");
    }
}

function login(){

    const id   = document.getElementById("userid").value.trim();
    const pass = document.getElementById("password").value.trim();
    const errEl  = document.getElementById("error");
    const loadEl = document.getElementById("loading");

    errEl.innerText = "";

    // Rate limiting check
    const now = Date.now();
    const attempts = JSON.parse(localStorage.getItem("loginAttempts") || '{"count": 0, "firstAttempt": 0}');
    
    // Reset if 15 minutes have passed
    if (now - attempts.firstAttempt > 15 * 60 * 1000) {
        attempts.count = 0;
        attempts.firstAttempt = 0;
    }
    
    // Check if blocked
    if (attempts.count >= 5) {
        const remainingTime = Math.ceil((15 * 60 * 1000 - (now - attempts.firstAttempt)) / 60000);
        errEl.innerText = `Too many failed attempts. Try again in ${remainingTime} minutes.`;
        return;
    }

    // Input validation
    if(!id || !pass){
        errEl.innerText = "Enter ID and Password";
        // Record failed attempt
        attempts.count++;
        attempts.firstAttempt = attempts.firstAttempt || now;
        localStorage.setItem("loginAttempts", JSON.stringify(attempts));
        return;
    }
    
    // Basic input validation (less strict)
    
    // Validate user ID format (more permissive, max 50 chars)
    const idPattern = /^[a-zA-Z0-9\s\-_\.@]+$/;
    if(!idPattern.test(id) || id.length > 50){
        errEl.innerText = "Invalid ID format";
        // Record failed attempt
        attempts.count++;
        attempts.firstAttempt = attempts.firstAttempt || now;
        localStorage.setItem("loginAttempts", JSON.stringify(attempts));
        return;
    }
    
    // Validate password length (min 4, max 100 chars - more permissive)
    if(pass.length < 4 || pass.length > 100){
        errEl.innerText = "Password must be 4-100 characters";
        attempts.count++;
        attempts.firstAttempt = attempts.firstAttempt || now;
        localStorage.setItem("loginAttempts", JSON.stringify(attempts));
        return;
    }
    
    // Prevent only most dangerous injection patterns
    const dangerousPatterns = [
        /<script[^>]*>.*?<\/script>/gi,
        /javascript:/gi
    ];
    
    for(let pattern of dangerousPatterns){
        if(pattern.test(id) || pattern.test(pass)){
            errEl.innerText = "Invalid characters detected";
            attempts.count++;
            attempts.firstAttempt = attempts.firstAttempt || now;
            localStorage.setItem("loginAttempts", JSON.stringify(attempts));
            return;
        }
    }

    loadEl.style.display = "block";

    Papa.parse(USER_SHEET, {

        download: true,
        header: true,
        skipEmptyLines: true,

        complete: function(res){

            loadEl.style.display = "none";

            const users = res.data.filter(u => u.ID && u.Password);
            let found = false;

            users.forEach(u => {

                const uID   = (u.ID   || "").trim();
                const uPass = (u.Password || "").trim();
                const uRole = (u.Role || "user").trim().toLowerCase();
                const uName = (u.Name || "").trim();
                const uStatus = (u.Status || "active").trim().toLowerCase();

                if(uID === id && uPass === pass){

                    if (uStatus === "inactive") {
                        errEl.innerText = "❌ Account is deactivated.";
                        found = true; // Prevents "Wrong ID/Password" message
                        return;
                    }

                    found = true;

                    // Clear login attempts on successful login
                    localStorage.removeItem("loginAttempts");

                    localStorage.setItem("userid", uID);
                    localStorage.setItem("name",   uName);
                    localStorage.setItem("role",   uRole);

                    if(uRole === "admin" || uRole === "superadmin"){
                        location.href = "admin.html";
                    } else {
                        location.href = "dashboard.html";
                    }
                }
            });

            if(!found){
                // Record failed attempt for rate limiting
                attempts.count++;
                attempts.firstAttempt = attempts.firstAttempt || now;
                localStorage.setItem("loginAttempts", JSON.stringify(attempts));
                errEl.innerText = "Wrong ID or Password";
            }
        },

        error: function(err){
            loadEl.style.display = "none";
            console.error(err);
            errEl.innerText = "❌ Cannot connect. Try again.";
        }
    });
}

// Allow Enter key to login
document.addEventListener("keydown", function(e){
    if(e.key === "Enter") login();
});

</script>

<script>
    // --- Particle System ---
    (function() {
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const count = 70;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    size: Math.random() * 2 + 1
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.15)';
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p.x - p2.x;
                    let dy = p.y - p2.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    })();
</script>

</body>
</html>
